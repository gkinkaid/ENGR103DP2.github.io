<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Drone component icons">
  <g fill="none" stroke="currentColor" stroke-width="2" font-family="system-ui, sans-serif" font-size="12">
    <!-- chassis -->
    <g transform="translate(60 80)">
      <path d="M-30 0 L0 -25 L30 0 L0 25 Z" fill="currentColor" fill-opacity="0.15"/>
      <text x="0" y="55" text-anchor="middle" stroke="none" fill="currentColor">Chassis</text>
    </g>
    <!-- motor -->
    <g transform="translate(180 80)">
      <circle r="22" fill="currentColor" fill-opacity="0.15"/>
      <circle r="8"/>
      <text x="0" y="55" text-anchor="middle" stroke="none" fill="currentColor">Motors</text>
    </g>
    <!-- propeller -->
    <g transform="translate(300 80)">
      <ellipse cx="0" cy="0" rx="26" ry="5" fill="currentColor" fill-opacity="0.15"/>
      <ellipse cx="0" cy="0" rx="5" ry="26" fill="currentColor" fill-opacity="0.15"/>
      <text x="0" y="55" text-anchor="middle" stroke="none" fill="currentColor">Propellers</text>
    </g>
    <!-- battery -->
    <g transform="translate(420 80)">
      <rect x="-25" y="-12" width="50" height="24" rx="3" fill="currentColor" fill-opacity="0.15"/>
      <rect x="25" y="-5" width="4" height="10" fill="currentColor" stroke="none"/>
      <text x="0" y="55" text-anchor="middle" stroke="none" fill="currentColor">Battery</text>
    </g>
    <!-- flight controller -->
    <g transform="translate(540 80)">
      <rect x="-22" y="-22" width="44" height="44" rx="3" fill="currentColor" fill-opacity="0.15"/>
      <line x1="-12" y1="-22" x2="-12" y2="-28"/>
      <line x1="0" y1="-22" x2="0" y2="-28"/>
      <line x1="12" y1="-22" x2="12" y2="-28"/>
      <line x1="-12" y1="22" x2="-12" y2="28"/>
      <line x1="0" y1="22" x2="0" y2="28"/>
      <line x1="12" y1="22" x2="12" y2="28"/>
      <text x="0" y="55" text-anchor="middle" stroke="none" fill="currentColor">FC + ESC</text>
    </g>
    <!-- receiver -->
    <g transform="translate(660 80)">
      <rect x="-18" y="-12" width="36" height="24" rx="2" fill="currentColor" fill-opacity="0.15"/>
      <line x1="0" y1="-12" x2="0" y2="-28"/>
      <line x1="-6" y1="-25" x2="6" y2="-25"/>
      <text x="0" y="55" text-anchor="middle" stroke="none" fill="currentColor">RC Receiver</text>
    </g>
  </g>
</svg>
