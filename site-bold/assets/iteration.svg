<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-label="Design iteration timeline showing v1, v2, v3 of chassis">
  <g font-family="system-ui, sans-serif" font-size="13" fill="currentColor">
    <!-- timeline -->
    <line x1="80" y1="130" x2="640" y2="130" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/>
    <g stroke="currentColor" stroke-opacity="0.5">
      <circle cx="120" cy="130" r="6" fill="currentColor"/>
      <circle cx="360" cy="130" r="6" fill="currentColor"/>
      <circle cx="600" cy="130" r="6" fill="currentColor"/>
    </g>

    <!-- v1 -->
    <g transform="translate(120 60)">
      <rect x="-50" y="-30" width="100" height="50" rx="4" fill="none" stroke="currentColor" stroke-opacity="0.6"/>
      <line x1="-40" y1="-5" x2="40" y2="-5" stroke="currentColor" stroke-opacity="0.4"/>
      <text x="0" y="-50" text-anchor="middle" font-weight="bold">v1 — Solid plate</text>
      <text x="0" y="80" text-anchor="middle" fill-opacity="0.7" font-size="11">Heavy. Cracked at arms.</text>
    </g>

    <!-- v2 -->
    <g transform="translate(360 60)">
      <path d="M-50 -25 L-20 -25 L0 -10 L20 -25 L50 -25 L50 15 L20 15 L0 0 L-20 15 L-50 15 Z"
            fill="none" stroke="currentColor" stroke-opacity="0.7"/>
      <text x="0" y="-50" text-anchor="middle" font-weight="bold">v2 — X-cut frame</text>
      <text x="0" y="80" text-anchor="middle" fill-opacity="0.7" font-size="11">Lighter. Flexed under load.</text>
    </g>

    <!-- v3 (final) -->
    <g transform="translate(600 60)">
      <path d="M-50 -25 L-20 -25 L0 -10 L20 -25 L50 -25 L50 15 L20 15 L0 0 L-20 15 L-50 15 Z"
            fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-width="2"/>
      <line x1="-30" y1="-15" x2="-10" y2="-5" stroke="currentColor" stroke-opacity="0.6"/>
      <line x1="30" y1="-15" x2="10" y2="-5" stroke="currentColor" stroke-opacity="0.6"/>
      <text x="0" y="-50" text-anchor="middle" font-weight="bold">v3 — Ribbed X-frame</text>
      <text x="0" y="80" text-anchor="middle" fill-opacity="0.7" font-size="11">Reinforced. Crash-tested ✓</text>
    </g>

    <!-- arrows -->
    <g stroke="currentColor" stroke-opacity="0.4" fill="none">
      <path d="M170 130 Q240 110 310 130" stroke-width="1.5"/>
      <polygon points="310,130 302,126 302,134" fill="currentColor" stroke="none"/>
      <path d="M410 130 Q480 110 550 130" stroke-width="1.5"/>
      <polygon points="550,130 542,126 542,134" fill="currentColor" stroke="none"/>
    </g>

    <text x="360" y="240" text-anchor="middle" fill-opacity="0.5" font-size="11" font-style="italic">Three iterations of the 3D-printed chassis</text>
  </g>
</svg>
