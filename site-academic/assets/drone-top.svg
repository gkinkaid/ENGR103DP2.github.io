<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-label="Top-down view of Remote UGV with 3-wheel layout, 2 driven side wheels and 1 front support wheel">
  <defs>
    <linearGradient id="tubFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="350" cy="335" rx="260" ry="8" fill="currentColor" fill-opacity="0.06"/>

  <!-- chassis tub: outer rectangle (177.8 mm × 88.9 mm scaled) -->
  <rect x="100" y="80" width="480" height="200" rx="8" fill="url(#tubFill)" stroke="currentColor" stroke-width="2.5"/>
  <!-- inner floor (wall thickness shown) -->
  <rect x="118" y="98" width="444" height="164" rx="4" fill="currentColor" fill-opacity="0.04" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.2"/>

  <!-- motor slots in the long-side walls (centered) -->
  <g fill="currentColor" fill-opacity="0.18" stroke="currentColor" stroke-opacity="0.5" stroke-width="1">
    <rect x="305" y="76" width="70" height="22" rx="2"/>
    <rect x="305" y="262" width="70" height="22" rx="2"/>
  </g>

  <!-- TWO DRIVEN WHEELS — centered on each long side -->
  <g fill="currentColor" fill-opacity="0.85">
    <rect x="310" y="36" width="60" height="44" rx="6"/>
    <rect x="310" y="280" width="60" height="44" rx="6"/>
  </g>
  <!-- driven wheel hubs -->
  <g fill="none" stroke="currentColor" stroke-opacity="0.4" stroke-width="1.2">
    <circle cx="340" cy="58" r="8"/>
    <circle cx="340" cy="302" r="8"/>
  </g>
  <!-- driven wheel tread -->
  <g stroke="currentColor" stroke-opacity="0.3" stroke-width="0.8">
    <line x1="316" y1="48" x2="364" y2="48"/><line x1="316" y1="70" x2="364" y2="70"/>
    <line x1="316" y1="290" x2="364" y2="290"/><line x1="316" y1="312" x2="364" y2="312"/>
  </g>

  <!-- ONE SUPPORT WHEEL (caster) at the FRONT — front is the right end -->
  <g>
    <!-- caster mount (small bracket on front wall) -->
    <rect x="578" y="170" width="18" height="20" rx="2" fill="currentColor" fill-opacity="0.55"/>
    <!-- caster wheel -->
    <circle cx="612" cy="180" r="16" fill="currentColor" fill-opacity="0.85"/>
    <circle cx="612" cy="180" r="6" fill="none" stroke="currentColor" stroke-opacity="0.4" stroke-width="1.2"/>
    <line x1="600" y1="180" x2="624" y2="180" stroke="currentColor" stroke-opacity="0.3" stroke-width="0.8"/>
  </g>

  <!-- INTERIOR COMPONENTS -->
  <!-- Battery pack (rear/center of tub) -->
  <g>
    <rect x="160" y="140" width="120" height="80" rx="4" fill="currentColor" fill-opacity="0.55"/>
    <line x1="220" y1="140" x2="220" y2="220" stroke="currentColor" stroke-opacity="0.3"/>
    <text x="220" y="186" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#fff">BATT ×2</text>
  </g>

  <!-- Raspberry Pi (center) -->
  <g>
    <rect x="295" y="140" width="100" height="68" rx="3" fill="currentColor" fill-opacity="0.35"/>
    <rect x="303" y="148" width="50" height="14" rx="1" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
    <circle cx="383" cy="148" r="2.5" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
    <circle cx="383" cy="158" r="2.5" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
    <circle cx="383" cy="168" r="2.5" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
    <circle cx="383" cy="178" r="2.5" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
    <circle cx="383" cy="188" r="2.5" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
    <text x="345" y="226" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="currentColor">RASPBERRY PI</text>
  </g>

  <!-- Motor driver (front-side, between Pi and camera) -->
  <g>
    <rect x="410" y="150" width="70" height="60" rx="3" fill="currentColor" fill-opacity="0.45"/>
    <line x1="420" y1="150" x2="420" y2="144" stroke="currentColor" stroke-opacity="0.5"/>
    <line x1="435" y1="150" x2="435" y2="144" stroke="currentColor" stroke-opacity="0.5"/>
    <line x1="450" y1="150" x2="450" y2="144" stroke="currentColor" stroke-opacity="0.5"/>
    <line x1="465" y1="150" x2="465" y2="144" stroke="currentColor" stroke-opacity="0.5"/>
    <text x="445" y="184" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#fff">MOTOR DRV</text>
  </g>

  <!-- Camera (front of chassis, inside tub near front wall) -->
  <g>
    <rect x="500" y="160" width="40" height="40" rx="3" fill="currentColor" fill-opacity="0.7"/>
    <circle cx="520" cy="180" r="9" fill="none" stroke="#fff" stroke-width="1.2"/>
    <circle cx="520" cy="180" r="4" fill="#fff"/>
    <text x="520" y="218" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="currentColor">CAM</text>
  </g>

  <!-- DC motor labels with leader lines pointing to driven wheels -->
  <g stroke="currentColor" stroke-opacity="0.5" stroke-width="1" fill="none">
    <line x1="340" y1="100" x2="340" y2="80"/>
    <line x1="340" y1="260" x2="340" y2="280"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="9" fill="currentColor" fill-opacity="0.7">
    <text x="385" y="74" text-anchor="start">DC motor — drives upper wheel</text>
    <text x="385" y="298" text-anchor="start">DC motor — drives lower wheel</text>
    <text x="612" y="220" text-anchor="middle">support wheel</text>
  </g>

  <!-- Front arrow + label -->
  <g>
    <polygon points="660,180 645,170 645,190" fill="currentColor" fill-opacity="0.7"/>
    <text x="650" y="160" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="currentColor" fill-opacity="0.6">FRONT</text>
  </g>

  <!-- dimension callouts -->
  <g stroke="currentColor" stroke-width="0.8" stroke-opacity="0.55" font-family="ui-monospace, monospace" font-size="11" fill="currentColor" fill-opacity="0.7">
    <line x1="100" y1="22" x2="580" y2="22"/>
    <line x1="100" y1="18" x2="100" y2="26"/>
    <line x1="580" y1="18" x2="580" y2="26"/>
    <text x="340" y="14" text-anchor="middle">177.8 mm (7")</text>

    <line x1="64" y1="80" x2="64" y2="280"/>
    <line x1="60" y1="80" x2="68" y2="80"/>
    <line x1="60" y1="280" x2="68" y2="280"/>
    <text x="56" y="184" text-anchor="end">88.9 mm</text>
    <text x="56" y="198" text-anchor="end">(3.5")</text>
  </g>
</svg>
