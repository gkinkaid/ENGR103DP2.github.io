<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Engineering blueprint of the 3D-printed UGV chassis tub showing 3-wheel layout">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="currentColor" stroke-opacity="0.08" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- TOP VIEW (plan): rectangular tub, 7" × 3.5" -->
  <g transform="translate(180 90)" fill="none" stroke="currentColor" stroke-width="2">
    <!-- outer wall -->
    <rect x="0" y="0" width="440" height="200" rx="6"/>
    <!-- inner floor -->
    <rect x="14" y="14" width="412" height="172" rx="3" stroke-opacity="0.5"/>
    <!-- mounting / standoff holes -->
    <circle cx="34" cy="34" r="4"/>
    <circle cx="406" cy="34" r="4"/>
    <circle cx="34" cy="166" r="4"/>
    <circle cx="406" cy="166" r="4"/>
    <!-- battery cutout outline -->
    <rect x="120" y="70" width="120" height="60" rx="3" stroke-opacity="0.55"/>
    <text x="180" y="105" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="currentColor" fill-opacity="0.6" stroke="none">BATT BAY</text>
    <!-- motor slots on long sides, centered -->
    <rect x="195" y="-4" width="50" height="20" rx="2" stroke-opacity="0.7" fill="currentColor" fill-opacity="0.1"/>
    <rect x="195" y="184" width="50" height="20" rx="2" stroke-opacity="0.7" fill="currentColor" fill-opacity="0.1"/>
    <!-- caster mount at front -->
    <rect x="430" y="84" width="22" height="32" rx="2" stroke-opacity="0.7" fill="currentColor" fill-opacity="0.1"/>
    <!-- DRIVEN WHEELS (top view) -->
    <g fill="currentColor" fill-opacity="0.5" stroke="currentColor" stroke-opacity="0.6">
      <rect x="200" y="-32" width="40" height="28" rx="3"/>
      <rect x="200" y="204" width="40" height="28" rx="3"/>
    </g>
    <!-- CASTER (top view) -->
    <circle cx="466" cy="100" r="12" fill="currentColor" fill-opacity="0.5" stroke-opacity="0.6"/>
    <!-- arrow indicating front -->
    <polygon points="490,100 475,92 475,108" fill="currentColor" fill-opacity="0.5" stroke="none"/>
    <text x="498" y="103" font-family="ui-monospace, monospace" font-size="9" fill="currentColor" fill-opacity="0.5" stroke="none">FRONT</text>
  </g>

  <!-- SIDE VIEW (profile): wall height 1.25" -->
  <g transform="translate(180 370)" fill="none" stroke="currentColor" stroke-width="2">
    <!-- tub side: outer -->
    <path d="M 0 0 L 440 0 L 440 50 L 0 50 Z"/>
    <!-- inner floor line (wall + floor thickness) -->
    <path d="M 12 12 L 428 12 L 428 50 L 12 50 Z" stroke-opacity="0.45" stroke-dasharray="3 4"/>
    <!-- DRIVEN wheel — centered along length, larger -->
    <circle cx="220" cy="60" r="26" stroke-opacity="0.75"/>
    <circle cx="220" cy="60" r="6" stroke-opacity="0.5" fill="currentColor" fill-opacity="0.3"/>
    <!-- CASTER wheel — front, smaller -->
    <circle cx="408" cy="62" r="14" stroke-opacity="0.75"/>
    <circle cx="408" cy="62" r="3" stroke-opacity="0.5" fill="currentColor" fill-opacity="0.3"/>
    <!-- caster mount bracket -->
    <rect x="400" y="48" width="16" height="6" stroke-opacity="0.5" fill="currentColor" fill-opacity="0.15"/>
    <!-- ground line -->
    <line x1="-10" y1="86" x2="450" y2="86" stroke="currentColor" stroke-opacity="0.25" stroke-dasharray="2 3"/>
  </g>

  <!-- DIMENSION LINES -->
  <g stroke="currentColor" stroke-width="1" stroke-opacity="0.7" font-family="ui-monospace, monospace" font-size="13" fill="currentColor">
    <!-- length -->
    <line x1="180" y1="60" x2="620" y2="60"/>
    <line x1="180" y1="54" x2="180" y2="66"/>
    <line x1="620" y1="54" x2="620" y2="66"/>
    <text x="400" y="50" text-anchor="middle" stroke="none">177.8 mm (7")</text>

    <!-- width -->
    <line x1="650" y1="90" x2="650" y2="290"/>
    <line x1="644" y1="90" x2="656" y2="90"/>
    <line x1="644" y1="290" x2="656" y2="290"/>
    <text x="660" y="186" text-anchor="start" stroke="none">88.9 mm</text>
    <text x="660" y="202" text-anchor="start" stroke="none">(3.5")</text>

    <!-- height (side view tub) -->
    <line x1="640" y1="370" x2="640" y2="420"/>
    <line x1="634" y1="370" x2="646" y2="370"/>
    <line x1="634" y1="420" x2="646" y2="420"/>
    <text x="650" y="400" text-anchor="start" stroke="none">31.75 mm</text>
    <text x="650" y="414" text-anchor="start" stroke="none">(1.25")</text>

    <!-- drive axle to caster spacing (side view) -->
    <line x1="400" y1="465" x2="588" y2="465"/>
    <line x1="400" y1="459" x2="400" y2="471"/>
    <line x1="588" y1="459" x2="588" y2="471"/>
    <text x="494" y="482" text-anchor="middle" stroke="none">drive axle → caster</text>
  </g>

  <!-- TITLE BLOCK -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="currentColor" fill-opacity="0.85">
    <text x="20" y="30" font-weight="bold" font-size="14">RCCHASSIS2 — UGV CHASSIS TUB</text>
    <text x="20" y="50">DRAWN: R. MERRY &amp; G. KINKAID</text>
    <text x="20" y="68">MATL: PLA, 1.75 mm</text>
    <text x="20" y="86">WHEELS: 2 driven + 1 caster</text>
    <text x="20" y="104">UNITS: in (mm shown)</text>

    <text x="20" y="320" font-weight="bold">PLAN VIEW</text>
    <text x="20" y="395" font-weight="bold">SIDE PROFILE</text>

    <text x="20" y="470">REV: 2</text>
    <text x="700" y="470" text-anchor="end">ENGR 103 / D8</text>
  </g>
</svg>
