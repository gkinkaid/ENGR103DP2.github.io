<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Engineering blueprint of the 3D-printed chassis with dimensions">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="currentColor" stroke-opacity="0.08" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- center plate top view -->
  <g transform="translate(250 110)" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="0" y="0" width="300" height="180" rx="10"/>
    <rect x="20" y="20" width="260" height="140" rx="6" stroke-opacity="0.5"/>
    <circle cx="40" cy="40" r="6"/>
    <circle cx="260" cy="40" r="6"/>
    <circle cx="40" cy="140" r="6"/>
    <circle cx="260" cy="140" r="6"/>
    <circle cx="150" cy="90" r="20"/>
    <line x1="130" y1="90" x2="170" y2="90" stroke-opacity="0.5"/>
    <line x1="150" y1="70" x2="150" y2="110" stroke-opacity="0.5"/>
    <rect x="80" y="70" width="40" height="40" stroke-opacity="0.5"/>
    <rect x="180" y="70" width="40" height="40" stroke-opacity="0.5"/>
  </g>

  <!-- arm cross-section bottom -->
  <g transform="translate(120 360)" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M0 30 L120 30 L150 0 L420 0 L450 30 L570 30 L570 50 L450 50 L420 80 L150 80 L120 50 L0 50 Z"/>
    <line x1="285" y1="0" x2="285" y2="80" stroke-opacity="0.3" stroke-dasharray="4 4"/>
  </g>

  <!-- dimension lines (top width) -->
  <g stroke="currentColor" stroke-width="1" stroke-opacity="0.7" font-family="ui-monospace, monospace" font-size="13" fill="currentColor">
    <line x1="250" y1="80" x2="550" y2="80"/>
    <line x1="250" y1="74" x2="250" y2="86"/>
    <line x1="550" y1="74" x2="550" y2="86"/>
    <text x="400" y="72" text-anchor="middle">160 mm</text>

    <line x1="585" y1="110" x2="585" y2="290"/>
    <line x1="579" y1="110" x2="591" y2="110"/>
    <line x1="579" y1="290" x2="591" y2="290"/>
    <text x="600" y="205" text-anchor="start">95 mm</text>

    <line x1="120" y1="340" x2="690" y2="340"/>
    <line x1="120" y1="334" x2="120" y2="346"/>
    <line x1="690" y1="334" x2="690" y2="346"/>
    <text x="405" y="332" text-anchor="middle">250 mm wheelbase</text>
  </g>

  <!-- title block -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="currentColor" fill-opacity="0.85">
    <text x="20" y="30" font-weight="bold" font-size="14">CHASSIS / X-FRAME</text>
    <text x="20" y="50">DRAWN: G. KINKAID</text>
    <text x="20" y="68">MATL: PLA+ 1.75mm</text>
    <text x="20" y="86">SCALE: 1:1.5</text>
    <text x="20" y="470">REV: A</text>
    <text x="690" y="470" text-anchor="end">ENGR 103 / D8</text>
  </g>
</svg>
